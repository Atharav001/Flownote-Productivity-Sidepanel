<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OmniPanel - Todos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#00344e",
                        "inverse-primary": "#732ee4",
                        "on-primary-fixed-variant": "#5a00c6",
                        "on-background": "#e5e2e1",
                        "surface-tint": "#d2bbff",
                        "background": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "secondary-container": "#00a2e6",
                        "on-secondary-fixed-variant": "#004c6e",
                        "on-tertiary-fixed-variant": "#713700",
                        "secondary-fixed": "#c9e6ff",
                        "surface-dim": "#131313",
                        "secondary": "#89ceff",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#ffe0cd",
                        "primary-fixed": "#eaddff",
                        "surface-bright": "#393939",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary": "#00344d",
                        "inverse-surface": "#e5e2e1",
                        "surface": "#131313",
                        "on-surface-variant": "#ccc3d8",
                        "primary-fixed-dim": "#d2bbff",
                        "on-primary-container": "#ede0ff",
                        "on-tertiary": "#4f2500",
                        "primary-container": "#7c3aed",
                        "outline": "#958da1",
                        "surface-variant": "#353534",
                        "secondary-fixed-dim": "#89ceff",
                        "tertiary-fixed": "#ffdcc6",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#001e2f",
                        "on-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#d2bbff",
                        "on-tertiary-fixed": "#301400",
                        "on-primary-fixed": "#25005a",
                        "surface-container-highest": "#353534",
                        "outline-variant": "#4a4455",
                        "tertiary": "#ffb784",
                        "error": "#ffb4ab",
                        "on-primary": "#3f008e",
                        "inverse-on-surface": "#313030",
                        "tertiary-container": "#a15100",
                        "tertiary-fixed-dim": "#ffb784"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "container-margin": "16px",
                        "element-gap": "8px",
                        "list-item-height": "32px",
                        "sidebar-padding": "12px"
                    },
                    "fontFamily": {
                        "kbd-shortcut": ["JetBrains Mono"],
                        "sidebar-title": ["Geist"],
                        "label-caps": ["JetBrains Mono"],
                        "body-compact": ["Inter"],
                        "body-main": ["Inter"]
                    },
                    "fontSize": {
                        "kbd-shortcut": ["11px", { "lineHeight": "12px", "fontWeight": "400" }],
                        "sidebar-title": ["14px", { "lineHeight": "20px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-compact": ["12px", { "lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "body-main": ["13px", { "lineHeight": "18px", "letterSpacing": "0px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 16px;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        /* Custom scrollbar for narrow container */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4455;
        }
    </style>
</head>
<body class="bg-surface-container-lowest min-h-screen flex items-center justify-center p-8">
<!-- Mock Browser Sidebar Container -->
<div class="w-[350px] h-[700px] flex border border-surface-variant rounded-xl overflow-hidden bg-background shadow-2xl relative">
<!-- SideNavBar (Shared Component) -->
<nav class="bg-surface dark:bg-surface text-primary dark:text-primary font-body-compact text-body-compact shadow-sm flex flex-col h-full p-sidebar-padding w-16 border-r border-surface-variant items-center shrink-0">
<!-- Header Avatar -->
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center mb-6 overflow-hidden border border-outline-variant">
<span class="material-symbols-outlined text-on-surface">person</span>
</div>
<!-- Nav Items -->
<div class="flex flex-col gap-2 w-full items-center">
<!-- Active Item: Todos -->
<button class="bg-primary/10 text-primary font-semibold rounded-xl flex items-center justify-center w-10 h-10 scale-95 active:scale-90 transition-transform duration-100 group relative" title="Todos">
<span class="material-symbols-outlined fill">checklist</span>
</button>
<!-- Inactive Item: Sticky Notes -->
<button class="text-on-surface-variant hover:bg-surface-variant/5 hover:bg-surface-variant/10 rounded-xl flex items-center justify-center w-10 h-10 scale-95 active:scale-90 transition-transform duration-100 group relative" title="Sticky Notes">
<span class="material-symbols-outlined">sticky_note_2</span>
</button>
<!-- Inactive Item: Quick Capture -->
<button class="text-on-surface-variant hover:bg-surface-variant/5 hover:bg-surface-variant/10 rounded-xl flex items-center justify-center w-10 h-10 scale-95 active:scale-90 transition-transform duration-100 group relative" title="Quick Capture">
<span class="material-symbols-outlined">bolt</span>
</button>
</div>
<div class="mt-auto pt-4 flex flex-col gap-2 w-full items-center">
<button class="text-on-surface-variant hover:bg-surface-variant/5 hover:bg-surface-variant/10 rounded-xl flex items-center justify-center w-10 h-10 scale-95 active:scale-90 transition-transform duration-100">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col h-full overflow-hidden bg-background">
<!-- Command Bar (Raycast Style) -->
<header class="h-[48px] shrink-0 border-b border-surface-variant bg-surface-container flex items-center px-3 relative z-10">
<span class="material-symbols-outlined text-on-surface-variant mr-2">search</span>
<input class="w-full bg-transparent border-none text-body-main font-body-main text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0 p-0 h-full" placeholder="Search or type a command..." type="text"/>
<div class="flex items-center gap-1 shrink-0 ml-2">
<span class="bg-surface-container-highest border border-surface-variant rounded px-1.5 py-0.5 text-on-surface-variant font-kbd-shortcut text-kbd-shortcut">⌘</span>
<span class="bg-surface-container-highest border border-surface-variant rounded px-1.5 py-0.5 text-on-surface-variant font-kbd-shortcut text-kbd-shortcut">K</span>
</div>
</header>
<!-- Scrollable List Area -->
<div class="flex-1 overflow-y-auto p-3 flex flex-col gap-6">
<!-- Inbox Section -->
<section class="flex flex-col gap-1">
<header class="flex items-center justify-between px-2 mb-1">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Inbox</h2>
<span class="font-body-compact text-body-compact text-on-surface-variant/50">2</span>
</header>
<div class="flex flex-col">
<!-- Todo Item -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default">
<button class="w-4 h-4 rounded-[4px] border border-outline-variant flex items-center justify-center hover:border-primary transition-colors shrink-0"></button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1">Review Q3 design system updates</span>
<div class="w-2 h-2 rounded-full bg-error shrink-0" title="High Priority"></div>
<span class="font-kbd-shortcut text-kbd-shortcut text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity bg-surface-variant px-1.5 rounded">1</span>
</div>
<!-- Todo Item -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default">
<button class="w-4 h-4 rounded-[4px] border border-outline-variant flex items-center justify-center hover:border-primary transition-colors shrink-0"></button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1">Sync with engineering on sidebar constraints</span>
<div class="w-2 h-2 rounded-full bg-tertiary shrink-0" title="Medium Priority"></div>
<span class="font-kbd-shortcut text-kbd-shortcut text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity bg-surface-variant px-1.5 rounded">2</span>
</div>
</div>
</section>
<!-- Today Section -->
<section class="flex flex-col gap-1">
<header class="flex items-center justify-between px-2 mb-1">
<h2 class="font-label-caps text-label-caps text-primary uppercase tracking-widest flex items-center gap-1.5">
<span class="material-symbols-outlined text-[12px]">today</span> Today
                        </h2>
<span class="font-body-compact text-body-compact text-primary/70">3</span>
</header>
<div class="flex flex-col">
<!-- Todo Item (Completed) -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default opacity-50">
<button class="w-4 h-4 rounded-[4px] border border-primary bg-primary/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[10px] text-primary font-bold">check</span>
</button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1 line-through">Draft component JSON structure</span>
</div>
<!-- Todo Item -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default">
<button class="w-4 h-4 rounded-[4px] border border-outline-variant flex items-center justify-center hover:border-primary transition-colors shrink-0"></button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1">Write CSS grid logic for bento card</span>
<span class="font-kbd-shortcut text-kbd-shortcut text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity bg-surface-variant px-1.5 rounded">3</span>
</div>
<!-- Todo Item -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default">
<button class="w-4 h-4 rounded-[4px] border border-outline-variant flex items-center justify-center hover:border-primary transition-colors shrink-0"></button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1">Update typography tokens</span>
<span class="font-kbd-shortcut text-kbd-shortcut text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity bg-surface-variant px-1.5 rounded">4</span>
</div>
</div>
</section>
<!-- Upcoming Section -->
<section class="flex flex-col gap-1">
<header class="flex items-center justify-between px-2 mb-1">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Upcoming</h2>
</header>
<div class="flex flex-col">
<!-- Todo Item -->
<div class="h-list-item-height flex items-center gap-3 px-2 rounded-lg hover:bg-surface-container-high group transition-colors cursor-default">
<button class="w-4 h-4 rounded-[4px] border border-outline-variant flex items-center justify-center hover:border-primary transition-colors shrink-0"></button>
<span class="font-body-main text-body-main text-on-surface truncate flex-1">Refactor icon mapping logic</span>
<div class="font-body-compact text-body-compact text-on-surface-variant/60 flex items-center gap-1 shrink-0">
<span class="material-symbols-outlined text-[12px]">calendar_month</span> Tomorrow
                            </div>
</div>
</div>
</section>
</div>
<!-- Bottom Action Area -->
<div class="p-3 border-t border-surface-variant bg-surface-container-lowest shrink-0">
<button class="w-full h-[32px] bg-primary-container text-on-primary-container rounded-lg font-sidebar-title text-sidebar-title flex items-center justify-center gap-2 hover:bg-primary-fixed transition-colors shadow-[0_1px_0_rgba(255,255,255,0.1)_inset]">
<span class="material-symbols-outlined text-[16px]">add</span>
                    New Entry
                </button>
</div>
</main>
</div>
</body></html>
